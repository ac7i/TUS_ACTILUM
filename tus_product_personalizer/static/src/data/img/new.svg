<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangles -->
  <rect x="10" y="10" width="100" height="50" fill="lightblue" stroke="blue" stroke-width="2"/>

  <!-- Circles -->
  <circle cx="200" cy="50" r="40" fill="green" stroke="black" stroke-width="2"/>

  <!-- Ellipse -->
  <ellipse cx="350" cy="50" rx="60" ry="30" fill="orange" stroke="red" stroke-width="2"/>

  <!-- Line -->
  <line x1="10" y1="100" x2="150" y2="100" stroke="purple" stroke-width="4"/>

  <!-- Polyline -->
  <polyline points="200,100 250,150 300,100 350,150" fill="none" stroke="brown" stroke-width="2"/>

  <!-- Polygon -->
  <polygon points="400,100 450,150 350,150" fill="pink" stroke="black" stroke-width="2"/>

  <!-- Path -->
  <path d="M 10 150 Q 60 200 110 150 T 210 150" fill="none" stroke="blue" stroke-width="2"/>

  <!-- Text -->
  <text x="10" y="250" font-family="Arial" font-size="24" fill="black">SVG Demo</text>

  <!-- Group with multiple elements -->
  <g fill="none" stroke="red" stroke-width="2">
    <circle cx="100" cy="300" r="30"/>
    <rect x="200" y="275" width="60" height="60"/>
    <line x1="350" y1="270" x2="400" y2="330"/>
  </g>

  <!-- Definitions (with gradient) -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(255,255,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,0,0);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shape with gradient -->
  <rect x="10" y="350" width="200" height="100" fill="url(#grad1)" />
</svg>
